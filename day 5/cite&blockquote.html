<!DOCTYPE html>

    <title>Cite and Blockquote</title>

<body>
    <p>
        In his revolutionary book, <cite>Atomic Habits</cite>, the author highlights the power of compounding systems,
        <blockquote>You do not rise to the level of your goals. You fall to the level of your systems.</blockquote>
    </p>
